# SonarQube Project Configuration
sonar.projectKey=django-auth
sonar.projectName=Django Authentication & Authorization
sonar.projectVersion=0.1.0

# Source configuration
sonar.sources=api,config
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.14

# Exclusions
sonar.exclusions=**/migrations/**,**/__pycache__/**,manage.py
sonar.test.exclusions=**/migrations/**,**/__pycache__/**

# Coverage report (pytest-cov XML output)
sonar.python.coverage.reportPaths=coverage.xml
