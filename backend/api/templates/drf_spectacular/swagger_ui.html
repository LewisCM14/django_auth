{% load static %}
<!DOCTYPE html>
<html lang="en" xml:lang="en">
  <head>
    {% block head %}
    <title>{{ title|default:"Swagger" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if favicon_href %}<link rel="icon" href="{{ favicon_href }}">{% endif %}
    <link rel="stylesheet" href="{{ swagger_ui_css }}">
    <link rel="stylesheet" href="{% static 'api/swagger-ui-overrides.css' %}">
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle }}"></script>
    <script src="{{ swagger_ui_standalone }}"></script>
    {% if script_url %}<script src="{{ script_url }}"></script>{% endif %}
    {% endblock %}
  </body>
</html>
