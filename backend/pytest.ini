[pytest]
DJANGO_SETTINGS_MODULE = config.pytest_settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts = --strict-markers --tb=short --cov --cov-report=term-missing --cov-report=xml
# ldap3 2.9.1 (latest) imports tagMap/typeMap from pyasn1 using the old pre-0.6 names.
# These filters suppress the resulting DeprecationWarning from third-party code that
# we cannot fix. Remove them once ldap3 ships a release that uses TAG_MAP/TYPE_MAP.
filterwarnings =
    ignore:tagMap is deprecated\. Please use TAG_MAP instead\.:DeprecationWarning:ldap3\.utils\.asn1
    ignore:typeMap is deprecated\. Please use TYPE_MAP instead\.:DeprecationWarning:ldap3\.utils\.asn1
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
